version: "2"
sql:
  - engine: postgresql
    schema: "migrations"
    queries: "sql/queries/queries.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infra/db/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
          - db_type: "alert_direction"
            go_type: "string"
          - db_type: "notification_channel"
            go_type: "string"
          - db_type: "job_status"
            go_type: "string"